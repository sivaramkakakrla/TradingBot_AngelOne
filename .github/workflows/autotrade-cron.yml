name: Auto-Trade Scanner

# Runs Mon-Fri during Indian market hours (9:15 AM - 3:30 PM IST = 3:45 AM - 10:00 AM UTC)
# GitHub Actions cron may delay runs by 5-15 min — that's fine for 60s scan intervals
on:
  schedule:
    - cron: "* 3-10 * * 1-5" # Every 1 min, 3:00-10:59 UTC (8:30-16:29 IST), Mon-Fri
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check Market Hours
        id: market
        run: |
          IST_HOUR=$(TZ=Asia/Kolkata date '+%H')
          IST_MIN=$(TZ=Asia/Kolkata date '+%M')
          IST_TIME="${IST_HOUR}:${IST_MIN}"
          echo "IST time: $IST_TIME"

          # Market hours: 9:15 AM - 3:30 PM IST
          if [[ "$IST_TIME" < "09:15" ]] || [[ "$IST_TIME" > "15:30" ]]; then
            echo "Outside market hours — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Within market hours — scanning"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Auto-Trade Scan (4x per minute, every 15s)
        if: steps.market.outputs.skip != 'true'
        run: |
          do_scan() {
            echo "Scanning at $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M:%S IST')"
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "https://angelonetradingbot.vercel.app/api/autotrade/scan" \
              -H "Content-Type: application/json" \
              -H "User-Agent: github-actions" \
              --max-time 12)
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)
            echo "  Status: $HTTP_CODE | Response: $BODY"
            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "::warning::Scan returned HTTP $HTTP_CODE"
            fi
          }

          # Scan 4 times in this 1-minute job window (~15s apart)
          do_scan
          sleep 15
          do_scan
          sleep 15
          do_scan
          sleep 15
          do_scan
