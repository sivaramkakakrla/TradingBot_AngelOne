<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Project Candles{% endblock %}</title>
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f8fafc;
            color: #0f172a;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 12px;
        }

        @media (max-width: 900px) {
            .container {
                padding: 12px 4px;
            }
        }
    </style>
    {% block head %}{% endblock %}
</head>

<body>
    {% block content %}{% endblock %}
</body>

</html>
