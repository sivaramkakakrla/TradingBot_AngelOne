<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&amp;L Details &mdash; Project Candles</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --card: #f1f5f9;
            --border: #e2e8f0;
            --border-lt: #cbd5e1;
            --txt: #0f172a;
            --txt-dim: #64748b;
            --txt-mute: #94a3b8;
            --accent: #3b82f6;
            --green: #16a34a;
            --green-bg: rgba(22, 163, 74, .08);
            --green-bdr: rgba(22, 163, 74, .25);
            --red: #dc2626;
            --red-bg: rgba(220, 38, 38, .08);
            --red-bdr: rgba(220, 38, 38, .25);
            --amber: #d97706;
        }

        body {
            background: var(--bg);
            color: var(--txt);
            font-family: 'Inter', system-ui, sans-serif;
        }

        .topbar {
            display: flex;
            align-items: center;
            padding: 0 24px;
            height: 48px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            gap: 16px;
            position: relative;
        }

        .logo {
            font-size: .95rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -.3px;
            text-decoration: none;
        }

        .topbar nav {
            display: flex;
            gap: 4px;
            margin-left: 16px;
        }

        .topbar nav a {
            color: var(--txt-dim);
            text-decoration: none;
            font-size: .8rem;
            font-weight: 500;
            padding: 6px 16px;
            border-radius: 8px;
            transition: all .15s;
        }

        .topbar nav a:hover {
            color: var(--txt);
            background: rgba(0, 0, 0, .05);
        }

        .topbar nav a.active {
            color: var(--accent);
            background: rgba(59, 130, 246, .1);
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            width: 32px;
            height: 32px;
            position: relative;
            padding: 0;
        }

        .hamburger span {
            display: block;
            width: 20px;
            height: 2px;
            background: var(--txt);
            border-radius: 2px;
            position: absolute;
            left: 6px;
            transition: all .25s;
        }

        .hamburger span:nth-child(1) {
            top: 8px;
        }

        .hamburger span:nth-child(2) {
            top: 15px;
        }

        .hamburger span:nth-child(3) {
            top: 22px;
        }

        .hamburger.open span:nth-child(1) {
            top: 15px;
            transform: rotate(45deg);
        }

        .hamburger.open span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.open span:nth-child(3) {
            top: 15px;
            transform: rotate(-45deg);
        }

        .mobile-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(0, 0, 0, .1);
            z-index: 100;
            padding: 8px 0;
            flex-direction: column;
        }

        .mobile-menu.show {
            display: flex;
        }

        .mobile-menu a {
            color: var(--txt-dim);
            text-decoration: none;
            font-size: .82rem;
            font-weight: 500;
            padding: 10px 20px;
            transition: all .15s;
        }

        .mobile-menu a:hover,
        .mobile-menu a.active {
            color: var(--accent);
            background: rgba(59, 130, 246, .06);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .ctx-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 10px;
        }

        .ctx-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
        }

        .ctx-key {
            font-size: .75rem;
            color: var(--txt-dim);
            font-weight: 500;
        }

        .ctx-val {
            font-size: .82rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .pos {
            color: var(--green) !important;
        }

        .neg {
            color: var(--red) !important;
        }

        @media (max-width: 900px) {
            .topbar {
                height: auto;
                padding: 10px 12px;
            }

            .topbar nav.desktop-nav {
                display: none;
            }

            .hamburger {
                display: block;
            }

            .container {
                padding: 16px 8px;
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <a href="/" class="logo">Project Candles</a>
        <nav class="desktop-nav">
            <a href="/">Dashboard</a>
            <a href="/orders">Orders</a>
            <a href="/chat">AI Chat</a>
            <a href="/180-rule">180 Rule</a>
            <a href="/orb-strategy">ORB Strategy</a>
            <a href="/pnl" class="active">P&amp;L</a>
            <a href="/opportunities">Opportunities</a>
            <a href="/history">History</a>
        </nav>
        <button class="hamburger" id="hamburger"
            onclick="document.getElementById('hamburger').classList.toggle('open');document.getElementById('mobile-menu').classList.toggle('show');">
            <span></span><span></span><span></span>
        </button>
        <div class="mobile-menu" id="mobile-menu">
            <a href="/">Dashboard</a>
            <a href="/orders">Orders</a>
            <a href="/chat">AI Chat</a>
            <a href="/180-rule">180 Rule</a>
            <a href="/orb-strategy">ORB Strategy</a>
            <a href="/pnl" class="active">P&amp;L</a>
            <a href="/opportunities">Opportunities</a>
            <a href="/history">History</a>
        </div>
    </div>
    <div class="container">
        <h2>P&amp;L Details</h2>
        <div id="pnl-details">
            <div class="ctx-card" id="pnl-summary-card">
                <div class="ctx-row">
                    <span class="ctx-key">Today's P&amp;L</span>
                    <span class="ctx-val" id="pnl-today">₹0</span>
                </div>
                <div class="ctx-row">
                    <span class="ctx-key">This Month</span>
                    <span class="ctx-val" id="pnl-month">₹0</span>
                </div>
                <div class="ctx-row">
                    <span class="ctx-key">Month Trades</span>
                    <span class="ctx-val" id="pnl-month-trades">0</span>
                </div>
                <div class="ctx-row">
                    <span class="ctx-key">Month Win Rate</span>
                    <span class="ctx-val" id="pnl-month-wr">0%</span>
                </div>
            </div>
            <div style="font-size:.68rem;font-weight:600;color:var(--txt-dim);margin-bottom:6px;margin-top:8px;">
                Last 4 Weeks</div>
            <div class="ctx-card" id="pnl-weekly-card">
                <div style="color:var(--txt-mute);font-size:.72rem;text-align:center;padding:6px 0;">Loading...</div>
            </div>
        </div>
    </div>
    <script>
        const RS = '₹';
        async function pollPnlSummary() {
            try {
                const r = await fetch('/api/pnl/summary');
                const d = await r.json();
                const todayPnl = d.today?.pnl || 0;
                const todayEl = document.getElementById('pnl-today');
                todayEl.textContent = (todayPnl >= 0 ? '+' : '') + RS + todayPnl.toFixed(2);
                todayEl.className = 'ctx-val ' + (todayPnl >= 0 ? 'pos' : 'neg');
                const monthPnl = d.this_month?.total_pnl || 0;
                const monthEl = document.getElementById('pnl-month');
                monthEl.textContent = (monthPnl >= 0 ? '+' : '') + RS + monthPnl.toFixed(2);
                monthEl.className = 'ctx-val ' + (monthPnl >= 0 ? 'pos' : 'neg');
                const mTrades = d.this_month?.trades || 0;
                const mWins = d.this_month?.wins || 0;
                document.getElementById('pnl-month-trades').textContent = mTrades;
                const wr = mTrades > 0 ? (mWins / mTrades * 100).toFixed(0) : 0;
                document.getElementById('pnl-month-wr').textContent = wr + '%';
                const weeklyEl = document.getElementById('pnl-weekly-card');
                const weeks = d.weekly || [];
                if (weeks.length === 0) {
                    weeklyEl.innerHTML = '<div style="color:var(--txt-mute);font-size:.72rem;text-align:center;padding:6px 0;">No data</div>';
                } else {
                    weeklyEl.innerHTML = weeks.map(w => {
                        const pnl = w.total_pnl || 0;
                        const cls = pnl >= 0 ? 'pos' : 'neg';
                        const ws = w.week_start ? w.week_start.slice(5) : '';
                        const we = w.week_end ? w.week_end.slice(5) : '';
                        const winLoss = w.trades > 0 ? w.wins + 'W / ' + w.losses + 'L' : '--';
                        return '<div class="ctx-row"><span class="ctx-key" style="font-size:.68rem;">' + ws + ' → ' + we + '</span>' +
                            '<span class="ctx-val ' + cls + '" style="font-size:.72rem;">' + (pnl >= 0 ? '+' : '') + RS + pnl.toFixed(2) + ' <span style="font-weight:500;color:var(--txt-mute);font-size:.6rem;">(' + winLoss + ')</span></span></div>';
                    }).join('');
                }
            } catch (e) { console.error('P&L summary error', e); }
        }
        document.addEventListener('DOMContentLoaded', pollPnlSummary);
    </script>
</body>

</html>
